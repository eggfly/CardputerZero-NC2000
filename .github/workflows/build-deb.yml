name: Build deb

on:
  push:
    branches: [main, ci/**]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  arm64:
    name: Build arm64 deb
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config fakeroot \
            libsdl2-dev dpkg-dev

      - name: Build .deb
        run: ./packaging/build_deb.sh

      - name: Show deb metadata
        run: |
          set -e
          deb=$(ls build/nc2000_*_*.deb)
          echo "=== $deb ==="
          dpkg-deb -I "$deb"
          echo "=== contents ==="
          dpkg-deb -c "$deb" | head -40

      - uses: actions/upload-artifact@v4
        with:
          name: nc2000-arm64-deb
          path: build/nc2000_*_arm64.deb
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/nc2000_*_arm64.deb
